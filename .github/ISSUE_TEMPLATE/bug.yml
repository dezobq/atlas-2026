name: 🐛 Bug técnico
description: Reportar bug no site, scripts ou infraestrutura do Atlas.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Obrigado por reportar. Este template é para bugs técnicos.
        Para erros de conteúdo (citações, timestamps), use **Correção factual**.

  - type: textarea
    id: description
    attributes:
      label: Descrição do bug
      description: O que está acontecendo? O que você esperava que acontecesse?
      placeholder: |
        Esperado: ...
        Atual: ...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Passos para reproduzir
      placeholder: |
        1. Acessar URL ...
        2. Clicar em ...
        3. Ver erro
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: URL onde ocorre
      placeholder: https://...
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Navegador e versão
      placeholder: Chrome 130, Firefox 132, Safari 17
    validations:
      required: false

  - type: textarea
    id: console
    attributes:
      label: Erros no console (se houver)
      render: text
    validations:
      required: false
